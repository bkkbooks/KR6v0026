body:
  text: 淨名經集解關中疏整理者黎明題解淨名經集解關中疏又名淨名經關中疏淨名集解關中疏關中集解淨名經疏佛教經典注疏由唐朝資聖寺沙門道液撰集而成流通中分為二卷本或四卷本本疏係道液對僧肇注維摩詰經進行刪補之作文中保留了注維摩詰經中羅什僧肇道生的一部分注解又增補了注維摩詰經中未收的僧睿天台湛然之解釋以及道液自己的注釋與科文是研究中國佛教思想的重要的參考著作本疏未為我國古代經録所收但曾為高麗沙門義天的新編諸宗教藏總録日本僧人所作東域傳燈目録入唐新求聖教目録等經録所著録日本常曉和尚請來目録中寫道是故每寺講淨名典化度白衣以液公疏提撕緇徒皆云雖有諸師注疏慧底未足乍學此文法鏡轉明慧燈益照者可見道液此疏為當時諸寺講學淨名經的首選教本本文未為我國歷代大藏經所收敦煌出土後被收入日本大正藏第卷但經疏文字有大段缺漏且錯訛較多本世紀初江味農居士曾豫整理因所用底校本數量有限文字亦不完整故有重新整理之必要本疏北京圖書館藏有薑號等餘號其中多有可相互綴接者英法俄日等國所藏亦有數十號其中多數抄本殘缺不全又多有錯謬故於其中選出較好的五號卷子為底校本整理本之底校本情況如下底本由斯號伯號拼合而成具體情況隨文説明校本甲本斯號乙本斯號丙本斯號丁本斯號其中丙本錯訛過多為避免校記繁雜故僅於必要時出校其它諸本則仍遵循本書的原則逢異必出録校時某些地方參用了大正藏本僧肇注維摩詰經中的文字還利用了敦煌遺書北號等個別卷子具體情況一概隨文説明録文
